name: CI

on:
  pull_request:
      types: [opened, reopened, synchronize]

jobs:
  check:
    name: Format, lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Typecheck
        run: deno check scripts/ shared/

      - name: Test
        run: deno test --allow-env
